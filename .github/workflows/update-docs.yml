name: Auto-update docs on push

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update-docs:
    name: Regenerate CODEBASE_MAP + CLAUDE.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2  # need last 2 commits to detect changes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run doc updater script
        run: node scripts/update-docs.mjs
        # Script exits 0 even on soft errors — never blocks the workflow

      - name: Check if docs changed
        id: check_changes
        run: |
          git diff --quiet docs/CODEBASE_MAP.md CLAUDE.md \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated docs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CODEBASE_MAP.md CLAUDE.md
          git commit -m "docs: auto-update CODEBASE_MAP + CLAUDE.md [skip ci]"
          git push
        # [skip ci] prevents an infinite loop — this commit won't re-trigger the workflow

name: Codebase map

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: codebase-map-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-map:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Regenerate codebase map
        run: npm run map:update

      - name: Verify AI rate-limit paths vs routes
        run: npm run map:check-parity

      - name: Ensure generated map is committed
        run: |
          git diff --exit-code docs/codebase-map.md docs/codebase-map.json docs/diagrams/codebase-map.mmd || (
            echo "::error::Run npm run map:update locally and commit docs/codebase-map.md, docs/codebase-map.json, and docs/diagrams/codebase-map.mmd"
            exit 1
          )

      - name: Upload map artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codebase-map-generated
          path: |
            docs/codebase-map.md
            docs/codebase-map.json
            docs/diagrams/codebase-map.mmd
